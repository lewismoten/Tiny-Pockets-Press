<dialog id="imageExportDialog" class="modal">
  <form method="dialog" class="modal-card image-export-dialog-card">
    <h3>Export Page Images</h3>
    <div class="image-export-dialog-layout">
      <div class="image-export-dialog-controls">
        <label
          >Common DPI
          <select id="imageExportDialogPreset">
            <option value="72">72 DPI</option>
            <option value="96">96 DPI</option>
            <option value="150">150 DPI</option>
            <option value="200">200 DPI</option>
            <option value="300">300 DPI</option>
            <option value="600">600 DPI</option>
            <option value="custom">Custom</option>
          </select>
        </label>
        <label id="imageExportDialogCustomWrap" hidden
          >Custom DPI
          <input
            id="imageExportDialogDpi"
            type="number"
            min="72"
            max="1200"
            step="1"
        /></label>
        <label
          >Image Format
          <select id="imageExportDialogFormat">
            <option value="png">PNG</option>
            <option value="gif">GIF</option>
            <option value="jpeg">JPEG</option>
            <option value="webp">WebP</option>
          </select>
        </label>
        <label
          >Color Depth
          <select id="imageExportDialogColorDepth">
            <option value="color24">24-bit Color</option>
            <option value="gray8">8-bit Grayscale</option>
            <option value="mono1">1-bit Black & White</option>
            <option value="indexed">Indexed</option>
          </select>
        </label>
        <div class="image-export-palette-row">
          <label id="imageExportDialogPaletteWrap"
            >Palette
            <select id="imageExportDialogPalette">
              <option value="websafe">Web-Safe</option>
              <option value="colors4">4 Colors</option>
              <option value="colors8">8 Colors</option>
              <option value="colors16">16 Colors</option>
              <option value="colors32">32 Colors</option>
              <option value="colors64">64 Colors</option>
              <option value="colors128">128 Colors</option>
              <option value="colors256">256 Colors</option>
              <option value="gray4">4 Grayscale</option>
              <option value="gray8">8 Grayscale</option>
              <option value="gray16">16 Grayscale</option>
              <option value="gray32">32 Grayscale</option>
              <option value="gray64">64 Grayscale</option>
              <option value="gray128">128 Grayscale</option>
              <option value="gray256">256 Grayscale</option>
              <option value="windows16">Windows 16</option>
              <option value="ansi16">ANSI 16</option>
              <option value="xterm256">Extended ANSI / Xterm</option>
              <option value="ega16">EGA</option>
              <option value="atari400base">Atari 400</option>
              <option value="atari400">Atari 400 Artifacting</option>
              <option value="cga0">CGA 0</option>
              <option value="cga1">CGA 1</option>
            </select>
          </label>
          <button
            type="button"
            id="imageExportPalettePreview"
            class="image-export-palette-preview"
            aria-label="Preview palette"
          >
            <canvas
              id="imageExportPalettePreviewCanvas"
              width="16"
              height="16"
            ></canvas>
          </button>
        </div>
        <label id="imageExportDialogQualityWrap"
          >Lossy Quality
          <input
            id="imageExportDialogQuality"
            type="range"
            min="1"
            max="100"
            step="1"
            value="92"
          />
          <span id="imageExportDialogQualityValue">92%</span>
        </label>
        <label id="imageExportDialogThresholdWrap"
          >1-bit Threshold
          <input
            id="imageExportDialogThreshold"
            type="range"
            min="0"
            max="255"
            step="1"
            value="128"
          />
          <span id="imageExportDialogThresholdValue">128</span>
        </label>
        <div id="imageExportDialogEstimate" class="image-export-estimate"></div>
      </div>
      <div class="image-export-dialog-preview">
        <div class="image-export-preview-toolbar">
          <button
            type="button"
            id="imageExportPreviewPrev"
            aria-label="Previous preview page"
          >
            ←
          </button>
          <div id="imageExportPreviewLabel" class="image-export-preview-label">
            Preview page 1
          </div>
          <button
            type="button"
            id="imageExportPreviewNext"
            aria-label="Next preview page"
          >
            →
          </button>
        </div>
        <div id="imageExportPreviewStage" class="image-export-preview-stage">
          <div class="image-export-preview-empty">Preview unavailable</div>
        </div>
        <div class="image-export-preview-controls">
          <label id="imageExportFrameDelayWrap"
            >Frame Delay (sec)
            <input
              id="imageExportFrameDelay"
              type="number"
              min="1"
              max="10"
              step="0.1"
              value="1"
          /></label>
          <button type="button" id="imageExportPreviewPlay">▶ Play</button>
          <div
            id="imageExportPreviewDuration"
            class="image-export-preview-duration"
          >
            Total duration: 0 seconds
          </div>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button type="button" id="imageExportDownloadBefore" disabled>
        Before
      </button>
      <button type="button" id="imageExportDownloadAfter" disabled>
        After
      </button>
      <button type="button" data-action="export-mp4">MP4</button>
      <button type="button" data-action="export-animated-gif">
        Animated GIF
      </button>
      <button type="button" data-action="export-images">ZIP</button>
      <button type="button" class="button-cancel" data-action="cancel">
        Cancel
      </button>
    </div>
  </form>
</dialog>
