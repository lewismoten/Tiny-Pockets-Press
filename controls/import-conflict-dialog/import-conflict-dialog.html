<dialog id="importConflictDialog" class="modal">
  <form method="dialog" class="modal-card">
    <h2>Import Conflict</h2>
    <p id="importConflictText" class="about-note"></p>
    <div id="importConflictBooks" class="conflict-grid"></div>
    <div class="modal-actions">
      <button type="button" data-action="merge">Merge</button>
      <button type="button" data-action="overwrite">Overwrite</button>
      <button type="button" data-action="copy" class="primary alt">
        Create Copy
      </button>
      <button type="button" data-action="cancel">Cancel</button>
    </div>
  </form>
</dialog>
