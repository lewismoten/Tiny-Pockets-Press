<dialog id="frontCoverFieldDialog" class="modal">
  <form method="dialog" class="modal-card">
    <h2 id="frontCoverFieldDialogTitle">Add Front Cover Text</h2>
    <p id="frontCoverFieldDialogNote" class="about-note">
      Choose another field from Book Info to place on the front cover.
    </p>
    <div
      id="frontCoverFieldDialogList"
      class="front-cover-field-dialog-list"
    ></div>
    <div class="modal-actions">
      <button type="button" class="button-cancel" data-action="cancel">
        Cancel
      </button>
    </div>
  </form>
</dialog>
