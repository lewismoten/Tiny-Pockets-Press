<dialog id="libraryUploadDialog" class="modal">
  <form method="dialog" class="modal-card">
    <h2>Upload Books</h2>
    <p class="hint">Import a book or library JSON file into your library.</p>
    <label
      >Choose JSON file
      <input
        id="importJson"
        type="file"
        accept=".book,.library,.json,application/json"
    /></label>
    <div class="toolbar">
      <button type="button" data-action="cancel">Cancel</button>
    </div>
  </form>
</dialog>
