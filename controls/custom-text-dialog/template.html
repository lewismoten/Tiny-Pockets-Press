<dialog id="customTextDialog" class="modal">
  <form method="dialog" class="modal-card custom-text-dialog-card">
    <div class="workspace-header">
      <h2 id="customTextDialogTitle">Edit Custom Text</h2>
    </div>
    <textarea
      id="customTextDialogBody"
      class="custom-text-dialog-body"
      rows="10"
      placeholder="Enter custom text"
    ></textarea>
    <div class="modal-actions">
      <button type="button" data-action="cancel">Cancel</button>
      <button type="button" data-action="save">Save</button>
    </div>
  </form>
</dialog>
