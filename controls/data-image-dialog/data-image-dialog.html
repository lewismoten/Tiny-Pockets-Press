<dialog id="dataImageDialog" class="modal">
  <form method="dialog" class="modal-card data-image-dialog-card">
    <div class="workspace-header">
      <h2 id="dataImageTitle">Image Preview</h2>
    </div>
    <div class="data-image-stage">
      <img id="dataImagePreview" alt="Preview" />
    </div>
    <div class="modal-actions">
      <button type="button" data-action="close">Close</button>
    </div>
  </form>
</dialog>
