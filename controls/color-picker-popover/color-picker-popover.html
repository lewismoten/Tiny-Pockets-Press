<div id="colorPickerPopover" class="color-picker-popover" hidden>
  <div class="color-picker-popover-card">
    <div class="color-picker-popover-top">
      <div id="colorPickerPreview" class="color-picker-preview"></div>
      <label
        >Hex Color
        <input
          id="colorPickerHex"
          type="text"
          inputmode="text"
          spellcheck="false"
          placeholder="#000000"
      /></label>
    </div>
    <div
      id="colorPickerSurface"
      class="color-picker-surface"
      aria-label="Saturation and brightness"
    >
      <div
        id="colorPickerSurfaceMarker"
        class="color-picker-surface-marker"
      ></div>
    </div>
    <div
      id="colorPickerHue"
      class="color-picker-hue"
      aria-label="Hue selector"
    >
      <div id="colorPickerHueMarker" class="color-picker-hue-marker"></div>
    </div>
    <div class="color-picker-section">
      <h3>Used Colors</h3>
      <div id="colorPickerUsedColors" class="color-picker-swatch-grid"></div>
    </div>
  </div>
</div>
